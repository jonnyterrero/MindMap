<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>MindMap</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #0b0f1a;
        color: #e6e8ef;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      .wrap {
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        text-align: center;
        padding: 2rem;
      }
      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #7c8cff;
        animation: pulse 1.2s ease-in-out infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 0.3;
          transform: scale(0.8);
        }
        50% {
          opacity: 1;
          transform: scale(1.1);
        }
      }
      a {
        color: #7c8cff;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="dot"></div>
      <p>Loading MindMap…</p>
      <p style="font-size: 0.8rem; opacity: 0.7">
        If this screen stays, check your connection or open
        <a href="https://getmindmapplus.app/">getmindmapplus.app</a>.
      </p>
    </div>
    <!--
      Offline/fallback only. In normal operation Capacitor loads server.url
      (https://getmindmapplus.app) directly and this file is never shown.
    -->
    <script>
      // If the shell ever renders this (no server.url, or a cold start),
      // try to reach the live app.
      setTimeout(function () {
        if (navigator.onLine) location.replace("https://getmindmapplus.app/");
      }, 800);
    </script>
  </body>
</html>
