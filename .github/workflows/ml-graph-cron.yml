name: ML graph batch (daily)

# Runs the verified-mindmap graph batch on a schedule and upserts
# mindmap_graphs (the app only reads them). Mirrors ml-summary-cron.yml.
#
# Inert until repository secrets are set (Settings → Secrets and variables →
# Actions → Secrets):
#   SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY   — required
#   ANTHROPIC_API_KEY                          — optional; enables the LLM
#     extractor + adversarial grounder (without it the batch degrades to the
#     deterministic rule skeleton + lexical grounder, still fail-closed).
# Idempotent (upsert on user_id+doc_id+pipeline_version) and re-runnable.

on:
  schedule:
    - cron: "30 8 * * *" # daily 08:30 UTC (after the summary batch)
  workflow_dispatch: {}

concurrency:
  group: ml-graph-batch
  cancel-in-progress: false

jobs:
  graphs:
    name: Build & upsert verified mindmap graphs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check secrets (skip if unset)
        id: guard
        env:
          KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -n "$KEY" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "SUPABASE_SERVICE_ROLE_KEY not set — skipping (inert until configured)."
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup uv
        if: steps.guard.outputs.run == 'true'
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Run graph batch
        if: steps.guard.outputs.run == 'true'
        working-directory: ml
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          uv sync
          uv pip install supabase
          if [ -n "$ANTHROPIC_API_KEY" ]; then
            uv run python -m mindmap_ml.serving.graph_batch --llm
          else
            uv run python -m mindmap_ml.serving.graph_batch
          fi
